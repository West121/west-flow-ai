spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/west_flow_ai}
    username: ${DB_USERNAME:westflow}
    password: ${DB_PASSWORD:westflow}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:westflow}

flowable:
  database-schema-update: true
  async-executor-activate: false
  async-history-executor-activate: false
  jpa-enabled: false
  rest-api-enabled: false
  app:
    enabled: false
  cmmn:
    enabled: false
  dmn:
    enabled: false
  idm:
    enabled: false
  eventregistry:
    enabled: false

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:west-flow-ai}

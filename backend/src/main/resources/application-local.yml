spring:
  datasource:
    url: ${DB_URL:jdbc:p6spy:postgresql://localhost:5432/west_flow_ai}
    username: ${DB_USERNAME:westflow}
    password: ${DB_PASSWORD:westflow}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:westflow}

flowable:
  database-schema-update: true
  async-executor-activate: false
  async-history-executor-activate: false
  jpa-enabled: false
  rest-api-enabled: false
  app:
    enabled: false
  cmmn:
    enabled: false
  dmn:
    enabled: false
  idm:
    enabled: false
  eventregistry:
    enabled: false

spring.ai:
  model:
    chat: openai
  openai:
    api-key: ${DASHSCOPE_API_KEY:dummy-key}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
    chat:
      options:
        model: ${DASHSCOPE_CHAT_MODEL:qwen3.5-plus}
  dashscope:
    enabled: false
    api-key: ${DASHSCOPE_API_KEY:dummy-key}
    chat:
      options:
        model: ${DASHSCOPE_CHAT_MODEL:qwen3.5-plus}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:west-flow-ai}

westflow:
  logging:
    slow-sql-threshold-ms: 500
    ip-region-resource: classpath:ip2region/ip2region_v4.xdb
  plm:
    connectors:
      erp:
        mode: stub
        transport: http-simulated
        endpoint-url: ${PLM_ERP_ENDPOINT_URL:http://localhost:18081}
        endpoint-path: ${PLM_ERP_ENDPOINT_PATH:/api/plm/erp/sync}
        description: ERP 主数据同步桩接口
      mes:
        mode: stub
        transport: http-simulated
        endpoint-url: ${PLM_MES_ENDPOINT_URL:http://localhost:18082}
        endpoint-path: ${PLM_MES_ENDPOINT_PATH:/api/plm/mes/sync}
        description: MES 执行同步桩接口
      pdm:
        mode: stub
        transport: http-simulated
        endpoint-url: ${PLM_PDM_ENDPOINT_URL:http://localhost:18083}
        endpoint-path: ${PLM_PDM_ENDPOINT_PATH:/api/plm/pdm/release}
        description: PDM 文档发布桩接口
      cad:
        mode: stub
        transport: http-simulated
        endpoint-url: ${PLM_CAD_ENDPOINT_URL:http://localhost:18084}
        endpoint-path: ${PLM_CAD_ENDPOINT_PATH:/api/plm/cad/publish}
        description: CAD 发布桩接口
  ai:
    copilot:
      fast-chat-model: ${DASHSCOPE_FAST_CHAT_MODEL:qwen-turbo-latest}
    mcp-demo:
      enabled: true
      endpoint-path: /api/mcp-demo
      server-name: westflow-mcp-demo
      server-version: 1.0.0
      description: 本地可直接演示的外部 Streamable HTTP MCP 服务
      summary-limit: 5

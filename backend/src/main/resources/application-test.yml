spring:
  autoconfigure:
    exclude:
      - org.flowable.spring.boot.RestApiAutoConfiguration
      - org.flowable.spring.boot.EndpointAutoConfiguration
      - org.flowable.spring.boot.actuate.info.FlowableInfoAutoConfiguration
      - org.flowable.spring.boot.FlowableJpaAutoConfiguration
      - org.flowable.spring.boot.FlowableSecurityAutoConfiguration
      - org.flowable.spring.boot.app.AppEngineAutoConfiguration
      - org.flowable.spring.boot.app.AppEngineServicesAutoConfiguration
      - org.flowable.spring.boot.cmmn.CmmnEngineAutoConfiguration
      - org.flowable.spring.boot.cmmn.CmmnEngineServicesAutoConfiguration
      - org.flowable.spring.boot.dmn.DmnEngineAutoConfiguration
      - org.flowable.spring.boot.dmn.DmnEngineServicesAutoConfiguration
      - org.flowable.spring.boot.idm.IdmEngineAutoConfiguration
      - org.flowable.spring.boot.idm.IdmEngineServicesAutoConfiguration
      - org.flowable.spring.boot.eventregistry.EventRegistryAutoConfiguration
      - org.flowable.spring.boot.eventregistry.EventRegistryServicesAutoConfiguration
      - org.flowable.spring.boot.ldap.FlowableLdapAutoConfiguration
      - com.yomahub.liteflow.springboot.config.LiteflowMainAutoConfiguration
      - com.yomahub.liteflow.springboot.config.LiteflowPropertyAutoConfiguration
  datasource:
    url: jdbc:h2:mem:westflow-${random.uuid};MODE=LEGACY;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
  liquibase:
    enabled: false

flowable:
  database-schema-update: true
  async-executor-activate: false
  async-history-executor-activate: false
  jpa-enabled: false
  rest-api-enabled: false
  idm.enabled: false
  eventregistry.enabled: false
  history-level: full

liteflow:
  enabled: false

spring.ai:
  model:
    chat: openai
  mcp:
    server:
      enabled: false
      annotation-scanner:
        enabled: false
  openai:
    api-key: test-key
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
    chat:
      options:
        model: qwen3.5-plus
  dashscope:
    enabled: false
    api-key: test-key
    chat:
      options:
        model: qwen3.5-plus

westflow:
  plm:
    connectors:
      erp:
        mode: stub
        transport: http-simulated
        endpoint-url: http://localhost:18081
        endpoint-path: /api/plm/erp/sync
        description: ERP 主数据同步桩接口
      mes:
        mode: stub
        transport: http-simulated
        endpoint-url: http://localhost:18082
        endpoint-path: /api/plm/mes/sync
        description: MES 执行同步桩接口
      pdm:
        mode: stub
        transport: http-simulated
        endpoint-url: http://localhost:18083
        endpoint-path: /api/plm/pdm/release
        description: PDM 文档发布桩接口
      cad:
        mode: stub
        transport: http-simulated
        endpoint-url: http://localhost:18084
        endpoint-path: /api/plm/cad/publish
        description: CAD 发布桩接口

logging:
  level:
    # 测试环境只保留 MCP 错误级日志，避免 provider/握手预探测刷屏。
    org.springaicommunity.mcp.provider: error
    io.modelcontextprotocol.client.LifecycleInitializer: error
    org.flowable.spring.boot.env.FlowableLiquibaseEnvironmentPostProcessor: error
    org.mybatis.spring.mapper.ClassPathMapperScanner: error

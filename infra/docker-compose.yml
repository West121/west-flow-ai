services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./env/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file:
      - ./env/.env
    command: ["sh", "-lc", "exec redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ./env/.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  workflow-collab:
    build:
      context: ../services/workflow-collab
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 1235
      WORKFLOW_COLLAB_AUTH_API: http://host.docker.internal:8080/api/v1/process-definitions/collaboration
      WORKFLOW_COLLAB_HEARTBEAT_INTERVAL_MS: 15000
      WORKFLOW_COLLAB_HEARTBEAT_TIMEOUT_MS: 45000
      WORKFLOW_COLLAB_ROOM_IDLE_TTL_MS: 60000
      WORKFLOW_COLLAB_MAX_CONNECTIONS_PER_ROOM: 12
      WORKFLOW_COLLAB_MAX_TOTAL_CONNECTIONS: 200
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "1235:1235"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:1235/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  minio-data:
